<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#af52de"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- 概念节点 (绿色锚点) -->
  <circle cx="160" cy="180" r="48" fill="#34c759" opacity="0.9"/>
  <text x="160" y="188" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="-apple-system, sans-serif">锚</text>

  <!-- 概念节点 (红色冲突) -->
  <circle cx="360" cy="160" r="44" fill="#ff3b30" opacity="0.85"/>
  <text x="360" y="168" text-anchor="middle" fill="white" font-size="25" font-weight="bold" font-family="-apple-system, sans-serif">冲</text>

  <!-- 概念节点 (蓝色激活) -->
  <circle cx="120" cy="350" r="40" fill="#5ac8fa" opacity="0.85"/>
  <text x="120" y="358" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="-apple-system, sans-serif">激</text>

  <!-- 中心新概念 (紫色) -->
  <circle cx="260" cy="260" r="52" fill="white" opacity="0.95" filter="url(#glow)"/>
  <text x="260" y="252" text-anchor="middle" fill="#af52de" font-size="22" font-weight="bold" font-family="-apple-system, sans-serif">新概念</text>
  <text x="260" y="276" text-anchor="middle" fill="#af52de" font-size="14" font-family="-apple-system, sans-serif" opacity="0.7">生态</text>

  <!-- 连线 -->
  <line x1="205" y1="205" x2="220" y2="228" stroke="white" stroke-width="3" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="312" y1="200" x2="280" y2="230" stroke="white" stroke-width="3" opacity="0.4"/>
  <line x1="156" y1="318" x2="220" y2="280" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- 外围节点 (小) -->
  <circle cx="380" cy="340" r="28" fill="#ff9500" opacity="0.8"/>
  <text x="380" y="346" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="-apple-system, sans-serif">构</text>

  <circle cx="310" cy="400" r="32" fill="white" opacity="0.25"/>
  <circle cx="180" cy="410" r="26" fill="white" opacity="0.2"/>
</svg>
